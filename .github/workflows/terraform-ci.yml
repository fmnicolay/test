name: terraform-ci

on:
  pull_request:
    paths:
      - "terraform-practice/**"
      - ".github/workflows/terraform-ci.yml"
  push:
    branches: [ master ]
    paths:
      - "terraform-practice/**"
      - ".github/workflows/terraform-ci.yml"

jobs:
  terraform-validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - dev
          - prod

    defaults:
      run:
        shell: bash
        working-directory: terraform-practice/01-workspace-bootstrapper

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.6

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate
        
  terraform-plan:
    needs: terraform-validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - dev
          - prod

    defaults:
      run:
        shell: bash
        working-directory: terraform-practice/01-workspace-bootstrapper

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.6

      - name: Terraform plan (${{ matrix.env }})
        run: terraform plan -input=false -no-color -var-file=environments/${{ matrix.env }}.tfvars
