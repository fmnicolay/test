name: testappaws-deploy

on:
  push:
    branches:
      - "**"
    paths:
      - "testAppAWS/**"
      - "infra/**"
      - ".github/workflows/testappaws-deploy.yml"
  workflow_dispatch:

env:
  AWS_REGION: ca-central-1
  ECR_REPO: testappaws

jobs:
  deploy-dev:
    if: github.ref_name != 'master'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC) [dev]
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image (dev)
        id: build
        run: |
          IMAGE_TAG="dev-${GITHUB_SHA::7}"
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          IMAGE_URI="$ECR_REGISTRY/${ECR_REPO}:$IMAGE_TAG"
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          docker build -t "$IMAGE_URI" ./testAppAWS
          docker push "$IMAGE_URI"

      - name: Terraform apply (dev)
        working-directory: infra/envs/dev
        run: |
          terraform init -input=false -reconfigure
          terraform apply -auto-approve -input=false \
            -var-file=dev.tfvars \
            -var "image=${{ steps.build.outputs.image_uri }}" \
            -var "tailscale_tailnet=${{ secrets.TAILSCALE_TAILNET }}" \
            -var "tailscale_oauth_client_id=${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}" \
            -var "tailscale_oauth_client_secret=${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}"

  deploy-prod:
    if: github.ref_name == 'master'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC) [prod]
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image (prod)
        id: build
        run: |
          IMAGE_TAG="prod-${GITHUB_SHA::7}"
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          IMAGE_URI="$ECR_REGISTRY/${ECR_REPO}:$IMAGE_TAG"
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          docker build -t "$IMAGE_URI" ./testAppAWS
          docker push "$IMAGE_URI"

      - name: Terraform apply (prod)
        working-directory: infra/envs/prod
        run: |
          terraform init -input=false -reconfigure
          terraform apply -auto-approve -input=false \
            -var-file=prod.tfvars \
            -var "image=${{ steps.build.outputs.image_uri }}"
