name: testappaws-ci

on:
  pull_request:
    paths:
      - "testAppAWS/**"
      - "infra/**"
      - ".github/workflows/testappaws-ci.yml"
  push:
    paths:
      - "testAppAWS/**"
      - "infra/**"
      - ".github/workflows/testappaws-ci.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: testAppAWS
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: mvn -q test

  terraform-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.6
      - run: terraform fmt -check -recursive

  terraform-plan:
    # Secrets are not available to workflows triggered from forked PRs.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    needs: [terraform-validate]
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        env: [dev, prod]
    defaults:
      run:
        shell: bash
        working-directory: infra/envs/${{ matrix.env }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          aws-region: ca-central-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.6

      - run: terraform init -input=false
      - run: terraform validate
      - run: terraform plan -input=false -no-color -var-file=${{ matrix.env }}.tfvars -var 'image=dummy'
