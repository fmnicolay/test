name: testappaws-ci

on:
  pull_request:
    paths:
      - "testAppAWS/**"
      - "infra/**"
      - ".github/workflows/testappaws-ci.yml"
  push:
    paths:
      - "testAppAWS/**"
      - "infra/**"
      - ".github/workflows/testappaws-ci.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: testAppAWS
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: mvn -q test

  terraform-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.6
      - run: terraform fmt -check -recursive

  terraform-plan:
    runs-on: ubuntu-latest
    needs: [terraform-validate]
    strategy:
      fail-fast: false
      matrix:
        env: [dev, prod]
    defaults:
      run:
        shell: bash
        working-directory: infra/envs/${{ matrix.env }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.6
      - run: terraform init -input=false
      - run: terraform validate
      - run: terraform plan -input=false -no-color -var-file=${{ matrix.env }}.tfvars -var 'image=dummy'
